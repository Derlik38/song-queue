<!DOCTYPE html>
<html>
<head>
    <title>DJ Song Queue</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0d0d0d;
            color: white;
            margin: 0;
            padding: 18px;
        }

        .card {
            max-width: 720px;
            margin: auto;
            background: #1a1a1a;
            padding: 18px;
            border-radius: 16px;
            box-shadow: 0 0 30px rgba(0,0,0,0.35);
        }

        h1, h2 {
            margin-top: 0;
        }

        input, button {
            width: 100%;
            font-size: 17px;
            padding: 12px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            box-sizing: border-box;
        }

        input {
            background: #2a2a2a;
            color: white;
            border: 1px solid #444;
        }

        button {
            background: #1db954;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button.secondary {
            background: #444;
        }

        button.danger {
            background: #c0392b;
        }

        button.small {
            width: auto;
            padding: 9px 12px;
            font-size: 14px;
            margin-left: 6px;
        }

        .song {
            background: #292929;
            padding: 13px;
            margin-top: 10px;
            border-radius: 12px;
            border-left: 5px solid #1db954;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            align-items: center;
        }

        .played {
            opacity: 0.45;
            border-left-color: #777;
        }

        .song-title {
            font-weight: bold;
            font-size: 18px;
        }

        .song-meta {
            color: #aaa;
            font-size: 14px;
            margin-top: 4px;
        }

        .qr {
            width: 220px;
            height: 220px;
            background: white;
            padding: 10px;
            border-radius: 12px;
            display: block;
            margin: 14px auto;
        }

        .link {
            color: #1db954;
            word-break: break-all;
        }

        .muted {
            color: #aaa;
            font-size: 14px;
        }

        .center {
            text-align: center;
        }

        .row-buttons {
            white-space: nowrap;
        }

        @media (max-width: 650px) {
            .song {
                flex-direction: column;
                align-items: flex-start;
            }

            .row-buttons {
                white-space: normal;
            }

            button.small {
                margin-left: 0;
                margin-right: 6px;
            }
        }
    </style>
</head>

<body>
    <div id="app"></div>

    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.4/build/qrcode.min.js"></script>

    <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // Replace these with your real Supabase values.
    const SUPABASE_URL = "https://gumjvmyuysjpjqmzsgpu.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1bWp2bXl1eXNqcGpxbXpzZ3B1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMTUxMjgsImV4cCI6MjA5NjY5MTEyOH0.UJqRil-1z6q2qEl1b-t73v-TcU2oju0pOTamxFGBgRo";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const app = document.getElementById("app");

    let realtimeChannel = null;
    let refreshTimer = null;

    let currentHostEventId = null;
    let currentHostToken = null;
    let currentSortMode = "default";

    function setHtml(html) {
        app.innerHTML = html;
    }

    function escapeHtml(text) {
        return String(text ?? "").replace(/[&<>"']/g, function(char) {
            return {
                "&": "&amp;",
                "<": "&lt;",
                ">": "&gt;",
                '"': "&quot;",
                "'": "&#039;"
            }[char];
        });
    }

    function getRoute() {
        return window.location.hash.replace(/^#/, "") || "";
    }

    function siteBaseUrl() {
        return window.location.origin + window.location.pathname;
    }

    function formatTime(isoString) {
        const date = new Date(isoString);

        return date.toLocaleTimeString([], {
            hour: "numeric",
            minute: "2-digit"
        });
    }

    function clearRealtime() {
        if (realtimeChannel) {
            supabase.removeChannel(realtimeChannel);
            realtimeChannel = null;
        }

        if (refreshTimer) {
            clearInterval(refreshTimer);
            refreshTimer = null;
        }

        currentHostEventId = null;
        currentHostToken = null;
        currentSortMode = "default";
    }

    async function renderHome() {
        clearRealtime();

        setHtml(`
            <div class="card center">
                <h1>DJ Song Queue</h1>
                <p class="muted">
                    Simple QR-code song requests for a party.
                </p>

                <button onclick="location.hash='host'">
                    Create / Host a Party
                </button>
            </div>
        `);
    }

    async function renderCreateHost() {
        clearRealtime();

        setHtml(`
            <div class="card">
                <h1>Create Party</h1>

                <input id="partyName" placeholder="Party name, example: Friday DJ Night">

                <button id="createBtn">Create Party</button>

                <p class="muted">
                    This creates a private DJ page and a public guest QR code.
                </p>

                <button class="secondary" onclick="location.hash=''">Back</button>
            </div>
        `);

        document.getElementById("createBtn").onclick = async function() {
            const partyName = document.getElementById("partyName").value.trim() || "DJ Party";

            const { data, error } = await supabase.rpc("create_party", {
                p_name: partyName
            });

            if (error) {
                alert("Could not create party: " + error.message);
                return;
            }

            const party = data[0];
            location.hash = "host/" + party.host_token;
        };
    }

    async function renderHostDashboard(hostToken) {
        clearRealtime();

        const { data, error } = await supabase.rpc("get_host_event", {
            p_host_token: hostToken
        });

        if (error || !data || data.length === 0) {
            setHtml(`
                <div class="card">
                    <h1>Host page not found</h1>
                    <p class="muted">The host token is missing or invalid.</p>
                    <button onclick="location.hash=''">Home</button>
                </div>
            `);
            return;
        }

        const event = data[0];
        const guestUrl = siteBaseUrl() + "#join/" + event.guest_code;

        currentHostEventId = event.event_id;
        currentHostToken = hostToken;
        currentSortMode = "default";

        setHtml(`
            <div class="card">
                <h1>${escapeHtml(event.name)}</h1>
                <p class="muted">DJ host screen</p>

                <div class="center">
                    <h2>Guest QR Code</h2>

                    <img
                        id="qrImage"
                        class="qr"
                        alt="Guest QR Code"
                    >

                    <div class="link">${escapeHtml(guestUrl)}</div>
                </div>

                <hr style="border-color:#333; margin: 22px 0;">

                <button class="secondary" id="clearPlayedBtn">Clear Played</button>

                <h2 style="margin-top: 20px;">Queue</h2>

                <label class="muted" for="sortMode">Sort mode:</label>
                <select
                    id="sortMode"
                    style="
                        width:100%;
                        font-size:17px;
                        padding:12px;
                        margin-top:8px;
                        margin-bottom:12px;
                        border-radius:10px;
                        background:#2a2a2a;
                        color:white;
                        border:1px solid #444;
                    "
                >
                    <option value="default">Default order</option>
                    <option value="popular">Most popular requests</option>
                </select>

                <div id="queue"></div>
            </div>
        `);

        const qrImage = document.getElementById("qrImage");

        qrImage.src =
            "https://api.qrserver.com/v1/create-qr-code/?size=220x220&margin=1&data=" +
            encodeURIComponent(guestUrl);

        document.getElementById("clearPlayedBtn").onclick = async function() {
            const { error } = await supabase.rpc("clear_played_requests", {
                p_host_token: hostToken
            });

            if (error) {
                alert("Could not clear played requests: " + error.message);
                return;
            }

            loadHostQueue(event.event_id, hostToken);
        };

        document.getElementById("sortMode").onchange = function() {
            currentSortMode = this.value;
            loadHostQueue(event.event_id, hostToken);
        };

        await loadHostQueue(event.event_id, hostToken);

        realtimeChannel = supabase
            .channel("host-requests-" + event.event_id)
            .on(
                "postgres_changes",
                {
                    event: "*",
                    schema: "public",
                    table: "requests",
                    filter: "event_id=eq." + event.event_id
                },
                function() {
                    loadHostQueue(event.event_id, hostToken);
                }
            )
            .subscribe();

        refreshTimer = setInterval(function() {
            loadHostQueue(event.event_id, hostToken);
        }, 2000);
    }

    async function loadHostQueue(eventId, hostToken) {
        if (currentSortMode === "popular") {
            await loadPopularHostQueue(eventId, hostToken);
        } else {
            await loadDefaultHostQueue(eventId, hostToken);
        }
    }

    async function loadDefaultHostQueue(eventId, hostToken) {
        const queue = document.getElementById("queue");

        if (!queue) {
            return;
        }

        const { data, error } = await supabase
            .from("requests")
            .select(`
                *,
                song_groups:song_group_id (
                    id,
                    display_title,
                    display_artist,
                    normalized_key
                )
            `)
            .eq("event_id", eventId)
            .neq("status", "deleted")
            .order("created_at", { ascending: true });

        if (error) {
            queue.innerHTML = `<p class="muted">Could not load queue: ${escapeHtml(error.message)}</p>`;
            return;
        }

        if (!data || data.length === 0) {
            queue.innerHTML = `<p class="muted">No requests yet.</p>`;
            return;
        }

        queue.innerHTML = data.map((item, index) => {
            const artist = item.artist ? " — " + item.artist : "";
            const name = item.guest_name ? "Requested by " + item.guest_name : "Anonymous request";
            const playedClass = item.status === "played" ? " played" : "";

            let matchText = "";
            if (item.match_method === "normalized_exact") {
                matchText = " • matched duplicate";
            } else if (item.match_method === "new_group") {
                matchText = " • new song";
            } else if (item.match_method === "backfilled") {
                matchText = " • backfilled";
            }

            return `
                <div class="song${playedClass}">
                    <div>
                        <div class="song-title">
                            ${index + 1}. ${escapeHtml(item.song)}${escapeHtml(artist)}
                        </div>
                        <div class="song-meta">
                            ${escapeHtml(name)} • ${formatTime(item.created_at)} • ${escapeHtml(item.status)}${escapeHtml(matchText)}
                        </div>
                    </div>

                    <div class="row-buttons">
                        <button class="small" onclick="markPlayed('${hostToken}', '${item.id}')">
                            Played
                        </button>

                        <button class="small danger" onclick="deleteRequest('${hostToken}', '${item.id}')">
                            Delete
                        </button>
                    </div>
                </div>
            `;
        }).join("");
    }

    async function loadPopularHostQueue(eventId, hostToken) {
        const queue = document.getElementById("queue");

        if (!queue) {
            return;
        }

        const { data, error } = await supabase
            .from("requests")
            .select(`
                *,
                song_groups:song_group_id (
                    id,
                    display_title,
                    display_artist,
                    normalized_key
                )
            `)
            .eq("event_id", eventId)
            .neq("status", "deleted")
            .order("created_at", { ascending: true });

        if (error) {
            queue.innerHTML = `<p class="muted">Could not load popular queue: ${escapeHtml(error.message)}</p>`;
            return;
        }

        if (!data || data.length === 0) {
            queue.innerHTML = `<p class="muted">No requests yet.</p>`;
            return;
        }

        const groups = new Map();

        data.forEach((item) => {
            const groupId = item.song_group_id || item.id;
            const groupData = item.song_groups || null;

            if (!groups.has(groupId)) {
                groups.set(groupId, {
                    groupId: groupId,
                    displayTitle: groupData ? groupData.display_title : item.song,
                    displayArtist: groupData ? groupData.display_artist : item.artist,
                    firstCreatedAt: item.created_at,
                    requests: [],
                    pendingCount: 0,
                    playedCount: 0
                });
            }

            const group = groups.get(groupId);
            group.requests.push(item);

            if (item.status === "pending") {
                group.pendingCount += 1;
            }

            if (item.status === "played") {
                group.playedCount += 1;
            }
        });

        const sortedGroups = Array.from(groups.values()).sort((a, b) => {
            const voteDiff = b.requests.length - a.requests.length;

            if (voteDiff !== 0) {
                return voteDiff;
            }

            return new Date(a.firstCreatedAt) - new Date(b.firstCreatedAt);
        });

        queue.innerHTML = sortedGroups.map((group, index) => {
            const artist = group.displayArtist ? " — " + group.displayArtist : "";
            const allPlayed = group.pendingCount === 0 && group.playedCount > 0;
            const playedClass = allPlayed ? " played" : "";

            const requestList = group.requests.map((request) => {
                const requestArtist = request.artist ? " — " + request.artist : "";
                const requestName = request.guest_name ? request.guest_name : "Anonymous";

                return `
                    <div class="song-meta" style="margin-top:6px;">
                        • ${escapeHtml(request.song)}${escapeHtml(requestArtist)}
                        — ${escapeHtml(requestName)}
                        — ${formatTime(request.created_at)}
                        — ${escapeHtml(request.status)}
                    </div>
                `;
            }).join("");

            return `
                <div class="song${playedClass}">
                    <div style="width:100%;">
                        <div class="song-title">
                            ${index + 1}. ${escapeHtml(group.displayTitle)}${escapeHtml(artist)}
                        </div>

                        <div class="song-meta">
                            ${group.requests.length} request${group.requests.length === 1 ? "" : "s"}
                            • ${group.pendingCount} pending
                            • ${group.playedCount} played
                        </div>

                        <details style="margin-top:8px;">
                            <summary class="muted">Show grouped requests</summary>
                            ${requestList}
                        </details>
                    </div>

                    <div class="row-buttons">
                        <button class="small" onclick="markGroupPlayed('${hostToken}', '${group.groupId}')">
                            Played
                        </button>

                        <button class="small danger" onclick="deleteGroup('${hostToken}', '${group.groupId}')">
                            Delete
                        </button>
                    </div>
                </div>
            `;
        }).join("");
    }

    window.markPlayed = async function(hostToken, requestId) {
        const { error } = await supabase.rpc("mark_request_played", {
            p_host_token: hostToken,
            p_request_id: requestId
        });

        if (error) {
            alert("Could not mark played: " + error.message);
            return;
        }

        if (currentHostEventId && currentHostToken) {
            loadHostQueue(currentHostEventId, currentHostToken);
        }
    };

    window.deleteRequest = async function(hostToken, requestId) {
        const { error } = await supabase.rpc("delete_request", {
            p_host_token: hostToken,
            p_request_id: requestId
        });

        if (error) {
            alert("Could not delete request: " + error.message);
            return;
        }

        if (currentHostEventId && currentHostToken) {
            loadHostQueue(currentHostEventId, currentHostToken);
        }
    };

    window.markGroupPlayed = async function(hostToken, groupId) {
        const { error } = await supabase.rpc("mark_group_played", {
            p_host_token: hostToken,
            p_song_group_id: groupId
        });

        if (error) {
            alert("Could not mark group played: " + error.message);
            return;
        }

        if (currentHostEventId && currentHostToken) {
            loadHostQueue(currentHostEventId, currentHostToken);
        }
    };

    window.deleteGroup = async function(hostToken, groupId) {
        const { error } = await supabase.rpc("delete_group_requests", {
            p_host_token: hostToken,
            p_song_group_id: groupId
        });

        if (error) {
            alert("Could not delete group: " + error.message);
            return;
        }

        if (currentHostEventId && currentHostToken) {
            loadHostQueue(currentHostEventId, currentHostToken);
        }
    };

    async function renderGuestPage(guestCode) {
        clearRealtime();

        const { data, error } = await supabase
            .from("events")
            .select("*")
            .eq("guest_code", guestCode)
            .eq("is_active", true)
            .single();

        if (error || !data) {
            setHtml(`
                <div class="card">
                    <h1>Party not found</h1>
                    <p class="muted">The QR code or guest code is invalid.</p>
                </div>
            `);
            return;
        }

        const event = data;

        setHtml(`
            <div class="card">
                <h1>${escapeHtml(event.name)}</h1>
                <p class="muted">Request a song</p>

                <input id="songInput" placeholder="Song name">
                <input id="artistInput" placeholder="Artist, optional">
                <input id="nameInput" placeholder="Your name, optional">

                <button id="submitBtn">Submit Song</button>

                <p id="statusText" class="muted"></p>

                <hr style="border-color:#333; margin: 22px 0;">

                <h2>Current Requests</h2>
                <div id="guestQueue"></div>
            </div>
        `);

        document.getElementById("submitBtn").onclick = async function() {
            const song = document.getElementById("songInput").value.trim();
            const artist = document.getElementById("artistInput").value.trim();
            const guestName = document.getElementById("nameInput").value.trim();

            if (!song) {
                document.getElementById("statusText").innerText = "Type a song name first.";
                return;
            }

            const { error } = await supabase.rpc("submit_request", {
                p_guest_code: guestCode,
                p_song: song,
                p_artist: artist,
                p_guest_name: guestName
            });

            if (error) {
                document.getElementById("statusText").innerText =
                    "Could not submit song: " + error.message;
                return;
            }

            document.getElementById("songInput").value = "";
            document.getElementById("artistInput").value = "";
            document.getElementById("statusText").innerText = "Song submitted.";

            loadGuestQueue(event.id);
        };

        await loadGuestQueue(event.id);

        realtimeChannel = supabase
            .channel("guest-requests-" + event.id)
            .on(
                "postgres_changes",
                {
                    event: "*",
                    schema: "public",
                    table: "requests",
                    filter: "event_id=eq." + event.id
                },
                function() {
                    loadGuestQueue(event.id);
                }
            )
            .subscribe();

        refreshTimer = setInterval(function() {
            loadGuestQueue(event.id);
        }, 2500);
    }

    async function loadGuestQueue(eventId) {
        const queue = document.getElementById("guestQueue");

        if (!queue) {
            return;
        }

        const { data, error } = await supabase
            .from("requests")
            .select(`
                *,
                song_groups:song_group_id (
                    id,
                    display_title,
                    display_artist
                )
            `)
            .eq("event_id", eventId)
            .eq("status", "pending")
            .order("created_at", { ascending: true });

        if (error) {
            queue.innerHTML = `<p class="muted">Could not load queue: ${escapeHtml(error.message)}</p>`;
            return;
        }

        if (!data || data.length === 0) {
            queue.innerHTML = `<p class="muted">No requests yet.</p>`;
            return;
        }

        const groups = new Map();

        data.forEach((item) => {
            const groupId = item.song_group_id || item.id;
            const groupData = item.song_groups || null;

            if (!groups.has(groupId)) {
                groups.set(groupId, {
                    displayTitle: groupData ? groupData.display_title : item.song,
                    displayArtist: groupData ? groupData.display_artist : item.artist,
                    firstCreatedAt: item.created_at,
                    count: 0
                });
            }

            groups.get(groupId).count += 1;
        });

        const sortedGroups = Array.from(groups.values()).sort((a, b) => {
            return new Date(a.firstCreatedAt) - new Date(b.firstCreatedAt);
        });

        queue.innerHTML = sortedGroups.map((group, index) => {
            const artist = group.displayArtist ? " — " + group.displayArtist : "";
            const countText = group.count > 1 ? ` • ${group.count} requests` : "";

            return `
                <div class="song">
                    <div>
                        <div class="song-title">
                            ${index + 1}. ${escapeHtml(group.displayTitle)}${escapeHtml(artist)}
                        </div>

                        <div class="song-meta">
                            Pending${escapeHtml(countText)}
                        </div>
                    </div>
                </div>
            `;
        }).join("");
    }

    async function route() {
        const route = getRoute();

        if (!route) {
            await renderHome();
            return;
        }

        if (route === "host") {
            await renderCreateHost();
            return;
        }

        if (route.startsWith("host/")) {
            const hostToken = route.split("/")[1];
            await renderHostDashboard(hostToken);
            return;
        }

        if (route.startsWith("join/")) {
            const guestCode = route.split("/")[1];
            await renderGuestPage(guestCode);
            return;
        }

        await renderHome();
    }

    window.addEventListener("hashchange", route);
    route();
</script>
</body>
</html>
